<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="wolfg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb5575"/>
      <stop offset="0.55" stop-color="#8a7bf5"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="bgg" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#11131f"/>
      <stop offset="1" stop-color="#05050a"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bgg)"/>
  <!-- Geometric wolf head facing forward -->
  <g fill="url(#wolfg)">
    <!-- ears -->
    <path d="M16 12 L24 26 L14 24 Z"/>
    <path d="M48 12 L40 26 L50 24 Z"/>
    <!-- head + snout (single angular shape) -->
    <path d="M14 24 L24 25 L32 22 L40 25 L50 24
             L46 36 L40 41 L36 52 L32 47 L28 52 L24 41 L18 36 Z"/>
  </g>
  <!-- eyes (negative space) -->
  <path d="M25 31 L29.5 33 L26 35 Z" fill="#05050a"/>
  <path d="M39 31 L34.5 33 L38 35 Z" fill="#05050a"/>
  <!-- nose -->
  <path d="M30 41 L34 41 L32 44 Z" fill="#05050a"/>
</svg>
